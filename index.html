<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invito Matrimonio | Aleksandra & Alessandro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="envelope-intro" id="envelopeIntro">
    <div class="envelope-wrapper">
      <div class="envelope-container">
        <div class="envelope-body">
          <div class="envelope-flap"></div>
          <div class="envelope-seal-band">
            <div class="seal-line"></div>
            <div class="seal" id="sealButton">
              <span class="seal-text">A&A</span>
            </div>
            <div class="seal-line"></div>
          </div>
        </div>
      </div>
      <div class="letter">
        <img class="letter-rings" src="fedi.png" alt="" aria-hidden="true" />
        <p class="letter-line">Aleksandra & Alessandro</p>
        <p class="letter-date">26.09.26</p>
      </div>
    </div>
  </div>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

  <script src="script.js"></script>
</body>

</html>
